name: Docker Publish

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]


  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: generate image tag
      run: |
        echo "IMAGE_TAG=$(date +%s)" >> $GITHUB_ENV

    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.PAT }}

    - name: Build and push frontend image
      run: |
        docker build -t ghcr.io/feher-kristof1/matchresult-frontend:$IMAGE_TAG ./MatchResultFrontend
        docker push ghcr.io/feher-kristof1/matchresult-frontend:$IMAGE_TAG

    - name: Build and push backend image
      run: |
        docker build -t ghcr.io/feher-kristof1/matchresult-backend:$IMAGE_TAG ./MatchResultBackend
        docker push ghcr.io/feher-kristof1/matchresult-backend:$IMAGE_TAG

    - name: Update K8s manifests with new image tags
      run: |
        sed -i 's|image: ghcr.io/feher-kristof1/matchresult-frontend:.*|image: ghcr.io/feher-kristof1/matchresult-frontend:'"$IMAGE_TAG"'|' deployment.yaml || true
        sed -i 's|image: ghcr.io/feher-kristof1/matchresult-backend:.*|image: ghcr.io/feher-kristof1/matchresult-backend:'"$IMAGE_TAG"'|' deployment.yaml || true
        sed -i 's|image: ghcr.io/feher-kristof1/matchresult-frontend:.*|image: ghcr.io/feher-kristof1/matchresult-frontend:'"$IMAGE_TAG"'|' test-deployment.yaml || true
        sed -i 's|image: ghcr.io/feher-kristof1/matchresult-backend:.*|image: ghcr.io/feher-kristof1/matchresult-backend:'"$IMAGE_TAG"'|' test-deployment.yaml || true

        git config --global user.email "${{ github.actor }}@users.noreply.github.com"
        git config --global user.name "${{ github.actor }}"
        git add deployment.yaml test-deployment.yaml || true
        git commit -m "Update K8s image tags: $IMAGE_TAG" || echo "No changes to commit"
        git push || echo "Push failed"

    - name: Deploy to Kubernetes cluster
      env:
        KUBECONFIG_DATA: ${{ secrets.K8SCONFIG }}
      run: |
        mkdir -p ~/.kube
        echo "$KUBECONFIG_DATA" | base64 --decode > ~/.kube/config
        kubectl apply -f deployment.yaml









        


    

