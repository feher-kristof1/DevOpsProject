services:
  ingress:
    image: nginx:1.27-alpine
    container_name: match-result-ingress
    depends_on:
      - frontend
      - backend
    volumes:
      - ./ingress/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ingress/certs:/etc/nginx/certs:ro
      - ./certbot/www:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - appnet

  backend:
    build:
      context: ./MatchResultBackend
      dockerfile: Dockerfile
    container_name: match-result-backend
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
    expose:
      - "8080"
    networks:
      - appnet

  frontend:
    build:
      context: ./MatchResultFrontend
      dockerfile: Dockerfile
    container_name: match-result-frontend
    expose:
      - "80"
    networks:
      - appnet

  certbot:
    image: certbot/certbot:latest
    container_name: match-result-certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
      - ./ingress/certs:/etc/nginx/certs
    networks:
      - appnet

networks:
  appnet:
    driver: bridge
